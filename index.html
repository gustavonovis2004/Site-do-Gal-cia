<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKR Compass — Planejamento Estratégico</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --teal:#1D9E75;--tealD:#085041;--tealL:#E1F5EE;--tealM:#9FE1CB;
    --amber:#EF9F27;--amberD:#633806;--amberL:#FAEEDA;
    --red:#E24B4A;--redD:#791F1F;--redL:#FCEBEB;
    --blue:#378ADD;--blueL:#E6F1FB;
    --purple:#7F77DD;--purpleL:#EEEDFE;
    --bg:#f5f5f0;--bgCard:#fff;--bgSec:#f0efea;
    --txt:#1a1a1a;--txtSec:#6b6b68;--border:rgba(0,0,0,0.12);--borderMed:rgba(0,0,0,0.22);
    --radius:8px;--radiusLg:12px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1a1a18;--bgCard:#242422;--bgSec:#2c2c2a;--txt:#f0efea;--txtSec:#888780;--border:rgba(255,255,255,0.1);--borderMed:rgba(255,255,255,0.2);}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;}
  input,select,button{font-family:inherit;font-size:inherit;}
  input[type=text],input[type=number],select{
    border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:13px;
    background:var(--bgCard);color:var(--txt);outline:none;transition:border .15s;
  }
  input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--teal);}
  input[type=range]{accent-color:var(--teal);cursor:pointer;}
  input[type=checkbox]{accent-color:var(--teal);}

  /* Layout */
  #app{min-height:100vh;display:flex;flex-direction:column;}
  .header{background:var(--bgCard);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .logo-icon{width:30px;height:30px;border-radius:7px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo-title{font-size:15px;font-weight:600;color:var(--txt);}
  .logo-sub{font-size:11px;color:var(--txtSec);}
  .quarter-sel{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .quarter-sel span{font-size:12px;color:var(--txtSec);}
  .q-btn{font-size:12px;padding:4px 10px;border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--txtSec);border:1px solid var(--border);transition:all .15s;}
  .q-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:500;}
  .progress-ring{display:flex;align-items:center;gap:8px;background:var(--bgSec);border-radius:var(--radius);padding:6px 12px;}
  .ring-labels p{font-size:11px;color:var(--txtSec);}
  .ring-labels b{font-size:11px;font-weight:500;color:var(--txt);}

  /* Tabs */
  .tabbar{background:var(--bgCard);border-bottom:1px solid var(--border);padding:0 24px;}
  .tabbar-inner{max-width:1100px;margin:0 auto;display:flex;}
  .tab-btn{padding:11px 18px;font-size:13px;cursor:pointer;background:transparent;border:none;color:var(--txtSec);border-bottom:2px solid transparent;transition:all .15s;font-weight:400;}
  .tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500;}

  /* Content */
  .content{max-width:1100px;margin:0 auto;padding:20px 24px;flex:1;}

  /* Cards */
  .card{background:var(--bgCard);border:1px solid var(--border);border-radius:var(--radiusLg);padding:16px 20px;}
  .met-grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .met-card{background:var(--bgSec);border-radius:var(--radius);padding:14px 16px;flex:1;min-width:140px;}
  .met-label{font-size:12px;color:var(--txtSec);margin-bottom:4px;}
  .met-val{font-size:24px;font-weight:500;line-height:1.1;}
  .met-sub{font-size:12px;color:var(--txtSec);margin-top:4px;}

  /* Progress bar */
  .pbar-wrap{background:var(--bgSec);border-radius:99px;overflow:hidden;}
  .pbar-fill{height:100%;border-radius:99px;transition:width .4s;}

  /* Badge */
  .badge{font-size:11px;font-weight:500;padding:2px 9px;border-radius:99px;white-space:nowrap;}

  /* Buttons */
  .btn{font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt);transition:all .15s;white-space:nowrap;}
  .btn:hover{background:var(--bgSec);}
  .btn-teal{background:var(--tealL);color:var(--tealD);border-color:var(--teal);}
  .btn-blue{background:var(--blueL);color:var(--blue);border-color:var(--blue);}
  .btn-danger{background:var(--redL);color:var(--redD);border-color:var(--red);}
  .btn-primary{background:var(--teal);color:#fff;border-color:var(--teal);}

  /* Section heading */
  .sec-hdr{font-size:13px;font-weight:500;color:var(--txtSec);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px;}

  /* OKR */
  .okr-section{margin-bottom:20px;}
  .okr-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bgSec);border-radius:var(--radiusLg);border:1px solid var(--border);cursor:pointer;transition:background .15s;user-select:none;}
  .okr-head:hover{background:var(--bgSec);}
  .okr-bar{width:4px;height:40px;border-radius:99px;flex-shrink:0;}
  .okr-body{flex:1;min-width:0;}
  .okr-title{font-size:15px;font-weight:500;color:var(--txt);}
  .okr-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .okr-chevron{font-size:16px;color:var(--txtSec);}
  .okr-krs{padding-left:16px;margin-top:8px;}
  .okr-krs.collapsed{display:none;}

  /* KR */
  .kr-card{margin-bottom:10px;}
  .kr-name{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:8px;}
  .kr-vals{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .kr-pct{font-size:13px;font-weight:500;min-width:36px;text-align:right;}
  .kr-range{font-size:12px;color:var(--txtSec);white-space:nowrap;}
  .kr-pa-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .kr-pa-label{font-size:11px;font-weight:500;color:var(--txtSec);letter-spacing:.05em;text-transform:uppercase;}
  .kr-pa-avg{font-size:11px;color:var(--txtSec);}
  .hr{flex:1;height:1px;background:var(--border);}

  /* PA */
  .pa-row{padding:10px 0;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
  .pa-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pa-dot{width:6px;height:6px;border-radius:99px;flex-shrink:0;}
  .pa-name{font-size:13px;color:var(--txt);flex:1;}
  .pa-owner{font-size:11px;color:var(--txtSec);}
  .pa-bottom{display:flex;align-items:center;gap:8px;}

  /* Edit mode */
  .edit-notice{background:var(--amberL);border:1px solid var(--amber);border-radius:var(--radius);padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--amberD);}

  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
  .kpi-card{position:relative;}
  .kpi-cat{font-size:11px;font-weight:500;padding:2px 7px;border-radius:99px;background:var(--purpleL);color:var(--purple);}
  .kpi-name{font-size:15px;font-weight:500;margin:8px 0 2px;}
  .kpi-full{font-size:11px;color:var(--txtSec);margin-bottom:10px;}
  .kpi-val-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;}
  .kpi-val{font-size:26px;font-weight:500;line-height:1;}
  .kpi-of{font-size:12px;color:var(--txtSec);}
  .kpi-pbar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .sparkline-wrap{height:55px;margin-top:4px;}
  .spark-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--txtSec);margin-top:2px;}

  /* Dashboard charts */
  .chart-wrap{position:relative;width:100%;overflow-x:auto;}
  .chart-legend{display:flex;gap:16px;font-size:12px;color:var(--txtSec);margin-top:8px;flex-wrap:wrap;}
  .leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;}

  /* Footer */
  footer{text-align:center;padding:14px;font-size:11px;color:var(--txtSec);border-top:1px solid var(--border);margin-top:20px;}

  /* Tooltip */
  .chart-tooltip{position:fixed;background:var(--bgCard);border:1px solid var(--borderMed);border-radius:var(--radius);padding:8px 12px;font-size:12px;pointer-events:none;z-index:999;display:none;max-width:200px;}

  /* Util */
  .flex{display:flex;}.gap8{gap:8px;}.gap12{gap:12px;}.wrap{flex-wrap:wrap;}.ac{align-items:center;}.jb{justify-content:space-between;}.mb8{margin-bottom:8px;}.mb14{margin-bottom:14px;}.mb20{margin-bottom:20px;}.mt8{margin-top:8px;}.f1{flex:1;min-width:0;}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">

          </svg>
        </div>
        <div>
          <div class="logo-title">OKR Compass</div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA & HELPERS
// ═══════════════════════════════════════════════════════════════
const C = {
  teal:"#1D9E75",tealD:"#085041",tealL:"#E1F5EE",tealM:"#9FE1CB",
  amber:"#EF9F27",amberD:"#633806",amberL:"#FAEEDA",
  red:"#E24B4A",redD:"#791F1F",redL:"#FCEBEB",
  blue:"#378ADD",blueL:"#E6F1FB",
  purple:"#7F77DD",purpleL:"#EEEDFE",
};
const ST = {
  on_track:{label:"No Prazo",c:C.teal,d:C.tealD,bg:C.tealL},
  at_risk:{label:"Em Risco",c:C.amber,d:C.amberD,bg:C.amberL},
  behind:{label:"Atrasado",c:C.red,d:C.redD,bg:C.redL},
};
let _uid=9000; const uid=()=>`${++_uid}`;
const QUARTERS=["Q1 2026","Q2 2026","Q3 2026","Q4 2026"];

function fmtVal(v,f){
  if(f==="currency"){
    if(v>=1e6)return`R$ ${(v/1e6).toFixed(2)}M`;
    if(v>=1e3)return`R$ ${(v/1e3).toFixed(0)}K`;
    return`R$ ${v}`;
  }
  if(f==="percent")return`${v}%`;
  return String(v);
}
function getPct(cur,tgt,inv){
  if(!tgt)return 0;
  const r=inv?(tgt/cur)*100:(cur/tgt)*100;
  return Math.min(100,Math.max(0,Math.round(r)));
}
function scColor(p){return p>=70?C.teal:p>=40?C.amber:C.red;}

o-institucional / 20% esportivo","prog":0,"owner":"A definir","st":"behind"},{"id":"p31","name":"Fazer 1 revisão de performance ao fim de cada mês: engajamento por segmento vs. meta e ajuste para Q2","prog":0,"owner":"A definir","st":"behind"}]}]}],
  kpis:[
    {id:"kpi1",name:"MRR",full:"Receita Recorrente Mensal",val:1360000,tgt:2000000,fmt:"currency",cat:"Financeiro",inv:false,trend:[980000,1050000,1120000,1200000,1280000,1360000]},
    {id:"kpi2",name:"Churn Rate",full:"Taxa de Churn Mensal",val:4.2,tgt:3.0,fmt:"percent",cat:"Retenção",inv:true,trend:[5.8,5.5,5.1,4.9,4.5,4.2]},
    {id:"kpi3",name:"NPS",full:"Net Promoter Score",val:58,tgt:70,fmt:"number",cat:"Satisfação",inv:false,trend:[45,48,51,53,56,58]},
    {id:"kpi4",name:"CAC",full:"Custo de Aquisição",val:850,tgt:600,fmt:"currency",cat:"Eficiência",inv:true,trend:[1200,1100,1000,950,900,850]},
    {id:"kpi5",name:"LTV",full:"Lifetime Value",val:8500,tgt:12000,fmt:"currency",cat:"Financeiro",inv:false,trend:[6200,6800,7200,7600,8000,8500]},
    {id:"kpi6",name:"Novos Clientes",full:"Novos Clientes no Trimestre",val:312,tgt:500,fmt:"number",cat:"Crescimento",inv:false,trend:[180,210,240,265,290,312]},
  ]
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = JSON.parse(JSON.stringify(D0));
try{
  const saved = localStorage.getItem("okr_compass");
  if(saved){const d=JSON.parse(saved);if(d.okrs&&d.kpis)state=d;}
}catch(e){}

let currentTab="dashboard";
let editMode=false;
let sparkCharts={};
let dashCharts={};
let saveTimer=null;

function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem("okr_compass",JSON.stringify(state));}catch(e){}
  },600);
}

// ═══════════════════════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════════════════════
function allKrs(){return state.okrs.flatMap(o=>o.krs.map(k=>({...k,okrId:o.id,okrLabel:o.obj})));}
function allPas(){return allKrs().flatMap(k=>k.pas.map(p=>({...p,krId:k.id,krName:k.name})));}
function avgOkrPct(){
  if(!state.okrs.length)return 0;
  const s=state.okrs.reduce((acc,o)=>{
    const avg=o.krs.length?o.krs.reduce((ss,k)=>ss+getPct(k.cur,k.tgt,k.inv),0)/o.krs.length:0;
    return acc+avg;
  },0);
  return Math.round(s/state.okrs.length);
}

// ═══════════════════════════════════════════════════════════════
// HEADER
// ═══════════════════════════════════════════════════════════════
function renderHeader(){
  const qb = document.getElementById("quarter-btns");
  qb.innerHTML = QUARTERS.map(q=>
    `<button class="q-btn${state.quarter===q?" active":""}" onclick="setQuarter('${q}')">${q}</button>`
  ).join("");

  const avg = avgOkrPct();
  const circ = 81.7;
  const arc = (avg/100)*circ;
  document.getElementById("ring-arc").setAttribute("stroke-dasharray",`${arc} ${circ}`);
  document.getElementById("ring-arc").setAttribute("stroke",scColor(avg));
  document.getElementById("ring-num").textContent=avg;
  document.getElementById("ring-num").style.color=scColor(avg);
  document.getElementById("ring-label").textContent=`${avg}% geral`;

  // Footer
  const krs=allKrs(), pas=allPas();
  document.getElementById("footer-bar").textContent=
    `${state.quarter} · ${state.okrs.length} OKRs · ${krs.length} KRs · ${pas.length} PAs · ${state.kpis.length} KPIs · dados salvos automaticamente`;
}

function setQuarter(q){state.quarter=q;save();renderHeader();render();}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  ["dashboard","planning","kpis"].forEach(t=>{
    document.getElementById("tab-"+t).style.display=t===tab?"":"none";
  });
  render();
}

  if(currentTab==="kpis")      renderKpis();
}

function renderDashboard(){
  const el=document.getElementById("tab-dashboard");

  const atRisk=pas.filter(p=>p.st==="at_risk").length;

  const cascade=state.okrs.flatMap(o=>o.krs.map(k=>({
    kr:k.name.length>22?k.name.slice(0,22)+"…":k.name,
    krPct:getPct(k.cur,k.tgt,k.inv),
    avgPa:k.pas.length?Math.round(k.pas.reduce((s,p)=>s+p.prog,0)/k.pas.length):0
  })));

  // PA data
  const paData=pas.map(p=>({
    name:p.name.length>26?p.name.slice(0,26)+"…":p.name,

  el.innerHTML=`
  <div class="met-grid">

    <div class="met-card"><div class="met-label">PAs No Prazo</div><div class="met-val" style="color:${C.teal}">${onTrack}</div><div class="met-sub">${atRisk} em risco · ${behind} atrasados</div></div>
    <div class="met-card"><div class="met-label">KPIs Atingidos</div><div class="met-val" style="color:${C.blue}">${kpiOk}/${state.kpis.length}</div><div class="met-sub">acima de 70% da meta</div></div>
    <div class="met-card"><div class="met-label">Total de PAs</div><div class="met-val">${pas.length}</div><div class="met-sub">em ${krs.length} Key Results</div></div>
  </div>

  <div class="card mb20">
    <div class="sec-hdr">Cascata de Contribuição — PA → KR</div>
    <p style="font-size:12px;color:var(--txtSec);margin-bottom:14px;">Comparação entre progresso médio dos PAs e realização do KR</p>
    <div class="chart-wrap">
      <div style="position:relative;width:100%;height:${cascade.length*52+70}px;">

    <div class="chart-legend">
      <span><span class="leg-dot" style="background:${C.tealM}"></span>Média PAs</span>
      <span><span class="leg-dot" style="background:${C.teal}"></span>Realização KR</span>
    </div>
  </div>

  <div class="card mb20">
    <div class="sec-hdr">Progresso por OKR</div>
    <div id="okr-progress-list"></div>
  </div>

  <div class="card mb20">
    <div class="sec-hdr">Desempenho de todos os PAs</div>
    <div class="chart-wrap">
      <div style="position:relative;width:100%;height:${paData.length*42+70}px;">
        <canvas id="chart-pas" role="img" aria-label="Gráfico de progresso dos planos de ação"></canvas>
      </div>
    </div>
  </div>
  `;

  // OKR progress list
  const opl=document.getElementById("okr-progress-list");
  state.okrs.forEach(o=>{
    const avg=o.krs.length?Math.round(o.krs.reduce((s,k)=>s+getPct(k.cur,k.tgt,k.inv),0)/o.krs.length):0;
    const div=document.createElement("div");
    div.style.marginBottom="16px";

function destroyChart(id){
  if(dashCharts[id]){dashCharts[id].destroy();delete dashCharts[id];}
  if(sparkCharts[id]){sparkCharts[id].destroy();delete sparkCharts[id];}
}

function renderPlanning(){
  const el=document.getElementById("tab-planning");
  let html=`
  <div class="flex jb ac mb14 wrap gap8">
    <div class="sec-hdr" style="margin:0">Hierarquia OKR · KR · PA</div>
    <div class="flex gap8">
      <button class="btn ${editMode?"btn-primary":""}" onclick="toggleEdit()">${editMode?"✓ Salvar Edições":"✎ Editar Planejamento"}</button>
      ${editMode?`<button class="btn btn-blue" onclick="addOkr()">+ Novo OKR</button>`:""}
    </div>
  </div>
  ${editMode?`<div class="edit-notice">Modo de edição ativo — modifique objetivos, KRs e PAs diretamente. Clique em "Salvar Edições" quando terminar.</div>`:""}

  if(!state.okrs.length){
    html+=`<div style="text-align:center;padding:3rem;color:var(--txtSec);">Nenhum OKR cadastrado. Clique em "Editar Planejamento" para começar.</div>`;

function renderOkrSection(o){
  const avg=o.krs.length?Math.round(o.krs.reduce((s,k)=>s+getPct(k.cur,k.tgt,k.inv),0)/o.krs.length):0;

  return `
  <div class="okr-section">

      <div class="okr-bar" style="background:${scColor(avg)};"></div>

        ${editMode
          ?`<input type="text" value="${esc(o.obj)}" onchange="updateOkrObj('${o.id}',this.value)" style="width:100%;font-size:15px;font-weight:500;">`
          :`<div class="okr-title">${esc(o.obj)}</div>`
        }
        <div class="okr-meta">

          <span style="font-size:12px;font-weight:500;color:${scColor(avg)}">${avg}%</span>

function renderPaRow(oid,kid,pa){
  const cfg=ST[pa.st]||ST.on_track;
  return `

      <span class="pa-dot" style="background:${cfg.c};"></span>

        ?`<input type="text" value="${esc(pa.name)}" onchange="updatePaField('${oid}','${kid}','${pa.id}','name',this.value)" style="flex:1;min-width:120px;">`
        :`<span class="pa-name">${esc(pa.name)}</span>`
      }
      ${editMode
        ?`<select onchange="updatePaField('${oid}','${kid}','${pa.id}','st',this.value)">
            <option value="on_track"${pa.st==="on_track"?" selected":""}>No Prazo</option>
            <option value="at_risk"${pa.st==="at_risk"?" selected":""}>Em Risco</option>
            <option value="behind"${pa.st==="behind"?" selected":""}>Atrasado</option>
          </select>
          <input type="text" value="${esc(pa.owner)}" placeholder="Responsável" onchange="updatePaField('${oid}','${kid}','${pa.id}','owner',this.value)" style="width:90px;">
          <button class="btn btn-danger" onclick="deletePa('${oid}','${kid}','${pa.id}')">✕</button>`
        :`<span class="badge" style="background:${cfg.bg};color:${cfg.d}">${cfg.label}</span>
          <span class="pa-owner">${esc(pa.owner)}</span>`
      }
    </div>
    <div class="pa-bottom">
      <div class="pbar-wrap f1" style="height:6px;"><div class="pbar-fill" style="width:${pa.prog}%;background:${scColor(pa.prog)};height:100%;"></div></div>
      ${editMode?`<input type="range" min="0" max="100" step="1" value="${pa.prog}" oninput="updatePaField('${oid}','${kid}','${pa.id}','prog',+this.value);this.nextElementSibling.textContent=this.value+'%'" style="width:80px;">`:""}

    </div>
  </div>`;
}

// Planning mutations
function toggleEdit(){editMode=!editMode;renderPlanning();}
function addOkr(){state.okrs.push({id:uid(),obj:"Novo Objetivo",krs:[]});save();renderPlanning();}
function deleteOkr(id){state.okrs=state.okrs.filter(o=>o.id!==id);save();renderPlanning();}
function updateOkrObj(oid,v){const o=state.okrs.find(x=>x.id===oid);if(o)o.obj=v;save();}
function addKr(oid){const o=state.okrs.find(x=>x.id===oid);if(o)o.krs.push({id:uid(),name:"Novo Key Result",tgt:100,cur:0,fmt:"number",inv:false,pas:[]});save();renderPlanning();}
function deleteKr(oid,kid){const o=state.okrs.find(x=>x.id===oid);if(o)o.krs=o.krs.filter(k=>k.id!==kid);save();renderPlanning();}
function updateKrField(oid,kid,field,val){const o=state.okrs.find(x=>x.id===oid);if(!o)return;const k=o.krs.find(x=>x.id===kid);if(k)k[field]=val;save();if(field!=="name")renderPlanning();}
function addPa(oid,kid){const o=state.okrs.find(x=>x.id===oid);if(!o)return;const k=o.krs.find(x=>x.id===kid);if(k)k.pas.push({id:uid(),name:"Nova ação",prog:0,owner:"",st:"on_track"});save();renderPlanning();}
function deletePa(oid,kid,pid){const o=state.okrs.find(x=>x.id===oid);if(!o)return;const k=o.krs.find(x=>x.id===kid);if(k)k.pas=k.pas.filter(p=>p.id!==pid);save();renderPlanning();}
function updatePaField(oid,kid,pid,field,val){
  const o=state.okrs.find(x=>x.id===oid);if(!o)return;
  const k=o.krs.find(x=>x.id===kid);if(!k)return;
  const p=k.pas.find(x=>x.id===pid);if(p)p[field]=val;
  save();
  if(field==="prog"){renderHeader();}
  if(field==="st"||field==="owner")renderPlanning();
}

          </label>
        </div>
      </div>
      <div class="sparkline-wrap">
        <canvas id="spark-${k.id}" role="img" aria-label="Tendência ${esc(k.name)}"></canvas>
      </div>
      <div class="spark-labels"><span>Jan</span><span>Jun</span></div>
    `;
    grid.appendChild(div);

    // Draw sparkline
    requestAnimationFrame(()=>{
      const ctx=document.getElementById("spark-"+k.id);
      if(!ctx)return;
      if(sparkCharts[k.id]){sparkCharts[k.id].destroy();}
      sparkCharts[k.id]=new Chart(ctx,{
        type:"line",
        data:{
          labels:months,
          datasets:[{data:k.trend,borderColor:scColor(p),borderWidth:2,pointRadius:0,tension:0.3,fill:false}]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{enabled:false}},
          scales:{x:{display:false},y:{display:false}}
        }
      });
    });
  });
}

function toggleKpiEdit(id){
  const view=document.getElementById("kpi-view-"+id);
  const edit=document.getElementById("kpi-edit-"+id);
  const isOpen=edit.style.display==="none";
  edit.style.display=isOpen?"block":"none";
  view.style.display=isOpen?"none":"block";
}
function updateKpi(id,field,val){
  const k=state.kpis.find(x=>x.id===id);
  if(k){k[field]=val;save();}
}
function addKpi(){
  state.kpis.push({id:uid(),name:"Novo KPI",full:"",val:0,tgt:100,fmt:"number",cat:"Outros",inv:false,trend:[0,0,0,0,0,0]});
  save();renderKpis();
}
function deleteKpi(id){
  if(sparkCharts[id]){sparkCharts[id].destroy();delete sparkCharts[id];}
  state.kpis=state.kpis.filter(k=>k.id!==id);
  save();renderKpis();
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function esc(s){
  if(s==null)return"";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll(".tab-btn").forEach(b=>{
  b.addEventListener("click",()=>switchTab(b.dataset.tab));
});

render();
</script>
